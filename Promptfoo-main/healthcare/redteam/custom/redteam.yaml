          ```

          - A local SQLite database containing patient profiles, visit history,
          medications, vitals, allergies, and follow-up tasks

          - Four FAISS vector knowledge bases containing static clinical
          reference content: vitals thresholds, chronic disease management
          guidelines, medication long-term use warnings, and allergy-drug
          interaction pairs

